name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build, Sign, Notarize, and Publish
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Drawl.xcodeproj \
            -clonedSourcePackagesDirPath build/SourcePackages

      - name: Build Release
        run: |
          xcodebuild build \
            -project Drawl.xcodeproj \
            -scheme Drawl \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -clonedSourcePackagesDirPath build/SourcePackages

      - name: Run tests
        run: |
          xcodebuild test \
            -project Drawl.xcodeproj \
            -scheme DrawlTests \
            -destination 'platform=macOS,arch=arm64' \
            -clonedSourcePackagesDirPath build/SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Decode and import the certificate
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm /tmp/certificate.p12

          # Allow codesign to access the key without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Sign app
        run: |
          codesign \
            --deep \
            --force \
            --verify \
            --verbose \
            --options runtime \
            --sign "Developer ID Application" \
            build/Build/Products/Release/Drawl.app

      - name: Package DMG
        run: bash scripts/create_dmg.sh --app-path build/Build/Products/Release/Drawl.app

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          NOTARIZATION_APP_SPECIFIC_PASSWORD: ${{ secrets.NOTARIZATION_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit build/Drawl.dmg \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_APP_SPECIFIC_PASSWORD" \
            --wait \
            --timeout 30m

      - name: Staple notarization ticket
        run: xcrun stapler staple build/Drawl.dmg

      - name: Validate staple
        run: xcrun stapler validate build/Drawl.dmg

      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "Drawl ${{ github.ref_name }}" \
            "build/Drawl.dmg#Drawl.dmg"
